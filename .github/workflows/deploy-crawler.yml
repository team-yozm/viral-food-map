name: Deploy Crawler

on:
  push:
    branches:
      - main
    paths:
      - "crawler/**"
      - ".github/workflows/deploy-crawler.yml"
  workflow_dispatch:

concurrency:
  group: koyeb-crawler-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KOYEB_CLI_VERSION: "5.10.1"
    steps:
      - name: Install Koyeb CLI
        run: |
          set -euo pipefail

          target="linux_amd64"
          version="v${KOYEB_CLI_VERSION}"
          url="https://github.com/koyeb/koyeb-cli/releases/download/${version}/koyeb-cli_${KOYEB_CLI_VERSION}_${target}.tar.gz"
          tmp_dir="$(mktemp -d)"
          archive_path="$tmp_dir/koyeb-cli.tar.gz"

          for attempt in 1 2 3; do
            if curl --fail --location --silent --show-error \
              --retry 3 --retry-all-errors \
              --output "$archive_path" \
              "$url"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to download Koyeb CLI from $url"
              exit 1
            fi

            sleep 5
          done

          mkdir -p "$HOME/.koyeb/bin"
          tar -xzf "$archive_path" -C "$HOME/.koyeb/bin"
          chmod +x "$HOME/.koyeb/bin/koyeb"
          "$HOME/.koyeb/bin/koyeb" version
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"

      - name: Redeploy crawler service
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$KOYEB_TOKEN"

          koyeb services redeploy crwal \
            --app silly-donnamarie \
            --token "$KOYEB_TOKEN" \
            --wait \
            --wait-timeout 15m

      - name: Health check crawler
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://silly-donnamarie-aiproject-41bab04f.koyeb.app/health" \
              --max-time 15 || true)

            echo "Health status: $http_code"

            if [ "$http_code" = "200" ]; then
              exit 0
            fi

            sleep 10
          done

          echo "Crawler health check failed after redeploy"
          exit 1
